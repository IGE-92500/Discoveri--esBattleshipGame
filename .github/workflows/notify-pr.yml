name: Notify PR Author

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR to notify responsible person
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            const message = `@${author} O Pull Request foi criado e está pronto para revisão. Por favor, acompanha os comentários e responde ao feedback da equipa.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: message
            });
